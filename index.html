<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f8f4; color: #1a1a18; }
.tree-wrap { padding: 24px 20px; max-width: 900px; margin: 0 auto; overflow-x: auto; }
h1.tree-title { font-size: 18px; font-weight: 500; color: #1a1a18; margin-bottom: 6px; }
p.tree-sub { font-size: 13px; color: #73726c; margin-bottom: 16px; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #73726c; }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.leg-king { background: #3C3489; }
.leg-prince { background: #0C447C; }
.leg-dhankuta { background: #3B6D11; }
.leg-you { background: #854F0B; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.node-btn { cursor: pointer; }
.node-btn:hover rect { opacity: 0.85; }
.tooltip {
  position: absolute;
  background: #fff;
  border: 1px solid #aaa;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #1a1a18;
  max-width: 240px;
  pointer-events: none;
  display: none;
  z-index: 99;
  line-height: 1.6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.tooltip.active { display: block; }
.tooltip strong { font-weight: 500; font-size: 13px; display: block; margin-bottom: 4px; }
.tooltip .dates { color: #73726c; font-size: 11px; margin-bottom: 4px; }
.tooltip .note { color: #555; font-size: 11px; }
</style>
</head>

<script>
const tipColors = { king:'#3C3489', prince:'#185FA5', dhankuta:'#27500A', you:'#854F0B' };
function showTip(e, name, dates, note, type) {
  const tt = document.getElementById('tt');
  tt.innerHTML = '<strong>' + name + '</strong><div class="dates">' + dates + '</div><div class="note">' + note + '</div>';
  tt.style.borderColor = tipColors[type] || '#888';
  tt.classList.add('active');
  const wrap = tt.parentElement;
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  tt.style.left = Math.min(x + 12, wrap.offsetWidth - 260) + 'px';
  tt.style.top = (y - 10) + 'px';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node-btn')) document.getElementById('tt').classList.remove('active');
});
</script>
